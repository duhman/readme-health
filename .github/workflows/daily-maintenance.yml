name: Daily Maintenance

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-maintenance
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Refresh dependency lockfile
        run: |
          npm update --package-lock-only
          npm audit fix --package-lock-only

      - name: Reinstall from refreshed lockfile
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check README health
        run: node dist/cli.js README.md --strict

      - name: Commit maintenance changes
        run: |
          if git diff --quiet; then
            echo "No maintenance changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json package.json
          git commit -m "chore: daily maintenance"
          git push origin main
