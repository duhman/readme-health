name: README Health

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  readme-health:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Check README
        uses: ./
        with:
          readme-path: README.md
          strict: "true"
